# Pre-commit hooks for py-marathon-utils.
# Install:  pip install pre-commit && pre-commit install
# Run all:  pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
        # We don't enforce ruff-format reflow project-wide; lint-only by default.
        stages: [manual]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^src/marathon_utils/fonts/.*\.txt$'  # bitmap-font rows are significant
      - id: end-of-file-fixer
        exclude: '^src/marathon_utils/fonts/.*\.txt$'
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=200]
