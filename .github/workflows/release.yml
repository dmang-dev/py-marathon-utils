name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) when a version tag is pushed.
#
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   add a "pending publisher" for project py-marathon-utils with:
#     Owner:        dmang-dev
#     Repository:   py-marathon-utils
#     Workflow:     release.yml
#     Environment:  pypi
# Then:  git tag v0.1.0 && git push origin v0.1.0
#
# No API token is stored anywhere — the OIDC id-token grants the upload.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      - name: Check metadata
        run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
